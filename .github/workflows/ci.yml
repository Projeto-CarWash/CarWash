name: CI

on:
  push:
    branches: [main, development, homolog]
  pull_request:
    branches: [main, development, homolog]

# Cancela jobs antigos do mesmo PR para não desperdiçar minuto
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────── BRANCH NAME ───────────────
  branch-name:
    name: Branch name convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if ! echo "$BRANCH" | grep -Eq '^(feat|fix|docs|style|refactor|test|chore|build|ci|perf)/[A-Za-z0-9._-]+$'; then
            echo "❌ Nome de branch inválido: '$BRANCH'"
            echo "   Padrão: <tipo>/<id-task>-<slug-kebab> (ver CONTRIBUTING.md §1)"
            exit 1
          fi
          echo "✅ branch: $BRANCH"

  # ─────────────── FRONTEND ───────────────
  frontend:
    name: Frontend (lint • typecheck • test • build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (placeholder)
        run: npm test --if-present -- --run

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

  # ─────────────── BACKEND ───────────────
  backend:
    name: Backend (format • build • test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # Só roda quando existir uma .sln — evita falhar enquanto o backend não foi bootstrapado
      - name: Check if backend exists
        id: backend_exists
        shell: bash
        run: |
          if compgen -G "backend/**/*.sln" > /dev/null; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Nenhuma .sln encontrada em backend/ — pulando jobs do backend."
          fi

      - uses: actions/setup-dotnet@v4
        if: steps.backend_exists.outputs.found == 'true'
        with:
          global-json-file: backend/global.json

      - name: Restore
        if: steps.backend_exists.outputs.found == 'true'
        run: dotnet restore

      - name: Format check
        if: steps.backend_exists.outputs.found == 'true'
        run: dotnet format --verify-no-changes --severity error

      - name: Build (Release, warnings as errors)
        if: steps.backend_exists.outputs.found == 'true'
        run: dotnet build --configuration Release --no-restore

      - name: Test
        if: steps.backend_exists.outputs.found == 'true'
        run: dotnet test --configuration Release --no-build

  # ─────────────── DOCKER ───────────────
  docker:
    name: Docker compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dev/hom/prod compose
        env:
          POSTGRES_PASSWORD: ci-only
          JWT_SECRET: ci-only-do-not-use-this-in-real-environments
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml  config --quiet
          docker compose -f docker-compose.yml -f docker-compose.hom.yml  config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
