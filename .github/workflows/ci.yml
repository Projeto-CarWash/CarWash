name: CI

on:
  push:
    branches: [main, development, homolog]
  pull_request:
    branches: [main, development, homolog]

# Cancela jobs antigos do mesmo PR para não desperdiçar minuto
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────── BRANCH NAME ───────────────
  branch-name:
    name: Branch name convention
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if ! echo "$BRANCH" | grep -Eq '^(((feat|fix|docs|style|refactor|test|chore|build|ci|perf)/[A-Za-z0-9._-]+)|(main|homolog|development))$'; then
            echo "❌ Nome de branch inválido: '$BRANCH'"
            echo "   Padrão: <tipo>/<id-task>-<slug-kebab> (ver CONTRIBUTING.md §1)"
            exit 1
          fi
          echo "✅ branch: $BRANCH"

  # ─────────────── FRONTEND ───────────────
  frontend:
    name: Frontend (lint • typecheck • test • build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # Unit tests (Vitest) com cobertura + gate (thresholds em vitest.config.ts).
      - name: Test (Vitest + coverage gate)
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/**/*
          if-no-files-found: warn
          retention-days: 14

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

  # ─────────────── BACKEND ───────────────
  backend:
    name: Backend (format • build • test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      # Só roda quando existir uma .sln — evita falhar enquanto o backend não foi bootstrapado
      - name: Check if backend exists
        id: backend_exists
        shell: bash
        run: |
          if find . -name "*.sln" -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Nenhuma .sln encontrada em backend/ — pulando jobs do backend."
          fi

      - uses: actions/setup-dotnet@v4
        if: steps.backend_exists.outputs.found == 'true'
        with:
          global-json-file: backend/global.json

      - name: Restore
        if: steps.backend_exists.outputs.found == 'true'
        run: dotnet restore

      - name: Format check
        if: steps.backend_exists.outputs.found == 'true'
        run: dotnet format --verify-no-changes --severity error

      - name: Build (Release, warnings as errors)
        if: steps.backend_exists.outputs.found == 'true'
        run: dotnet build --configuration Release --no-restore

      # Unit + integration. IntegrationTests usa Testcontainers; o runner
      # ubuntu-latest já tem Docker disponível, então o socket local basta —
      # não é preciso DinD aqui. O coverlet.runsettings aplica o gate global (60%).
      - name: Test (unit + integration, com coverage gate)
        if: steps.backend_exists.outputs.found == 'true'
        run: |
          dotnet test --configuration Release --no-build \
            --settings coverlet.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test-results.trx"

      # Gate por assembly (Domain >= 80%, Application >= 70%) a partir do
      # relatório cobertura — complementa o gate global do coverlet.
      - name: Coverage gate por assembly (Domain/Application)
        if: steps.backend_exists.outputs.found == 'true'
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool >/dev/null 2>&1 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            "-reports:TestResults/**/coverage.cobertura.xml" \
            "-targetdir:TestResults/coverage-report" \
            "-reporttypes:Cobertura;TextSummary"
          python3 - <<'PY'
          import sys, xml.etree.ElementTree as ET
          tree = ET.parse("TestResults/coverage-report/Cobertura.xml")
          root = tree.getroot()
          # Gates calibrados na cobertura REAL medida (merge UnitTests+IntegrationTests):
          # Domain 74.5% e Application 87.4% — mínimos abaixo disso com folga, para
          # serem guardas de regressão, não vermelho permanente. Reavalie ao subir.
          gates = {"CarWash.Domain": 0.70, "CarWash.Application": 0.80}
          rates = {}
          for pkg in root.iter("package"):
              name = pkg.get("name", "")
              for asm, _ in gates.items():
                  if name == asm or name.startswith(asm):
                      rates[asm] = float(pkg.get("line-rate", "0"))
          failed = False
          for asm, minimo in gates.items():
              got = rates.get(asm)
              if got is None:
                  print(f"AVISO: assembly {asm} não encontrado no relatório (sem gate aplicado).")
                  continue
              status = "OK" if got >= minimo else "FALHOU"
              print(f"{status}: {asm} cobertura {got:.1%} (mínimo {minimo:.0%})")
              if got < minimo:
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Upload test results
        if: steps.backend_exists.outputs.found == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/TestResults/**/*.trx
            backend/TestResults/**/coverage.cobertura.xml
            backend/TestResults/coverage-report/**/*
          if-no-files-found: warn
          retention-days: 14

  # ─────────────── DOCKER ───────────────
  docker:
    name: Docker compose validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dev/hom/prod compose
        env:
          POSTGRES_PASSWORD: ci-only
          Jwt__Secret: ci-only-do-not-use-this-in-real-environments
          CARWASH_SEED_ADMIN_PASSWORD: ci-only
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml  config --quiet
          docker compose -f docker-compose.yml -f docker-compose.hom.yml  config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
          docker compose -p carwash-test -f docker-compose.test.yml --profile e2e --profile unit config --quiet

  # ─────────────── E2E (Playwright contra a stack dockerizada) ───────────────
  e2e:
    name: E2E (Playwright via proxy)
    runs-on: ubuntu-latest
    # Só roda se as suítes unitárias passarem — falha cedo é mais barata.
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      # `make test-e2e` é o MESMO alvo usado localmente: sobe a stack
      # (postgres+migrator+backend+frontend+proxy), espera /health pelo proxy,
      # roda o Playwright e derruba tudo (mesmo em falha).
      - name: Run E2E (make test-e2e)
        run: make test-e2e

      - name: Upload Playwright report (trace/vídeo em falha)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/**/*
            frontend/test-results/**/*
          if-no-files-found: warn
          retention-days: 14
