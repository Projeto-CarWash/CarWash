# docker-compose.dev.yml — desenvolvimento local
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Características:
#   - Bind mount do código (hot reload)
#   - Sem proxy/TLS (acesso direto às portas)
#   - DB exposto na 5432 do host para uso de DBeaver/psql
#   - Sem migrator automático (dev roda manualmente quando quiser)

services:
  postgres:
    networks:
      - internal
      - public
    ports:
      - '5432:5432'

  # Em dev, o migrator não roda automaticamente — o dev controla
  # quando aplicar via `make migrate` ou dotnet ef diretamente
  migrator:
    profiles: ['manual']

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: '1'
    volumes:
      - ./backend:/src
      - backend_nuget:/root/.nuget/packages
    ports:
      - '${BACKEND_PORT:-8080}:8080'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    ports:
      - '${FRONTEND_PORT:-5173}:5173'

  # Sem proxy em dev — acesso direto
  proxy:
    profiles: ['never']

volumes:
  backend_nuget:
  frontend_node_modules:
