<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <!-- Carro estilizado — silhueta vermelha -->
  <g transform="translate(0, 8)">
    <!-- Corpo do carro -->
    <path d="M6 32h36v-6c0-1.5-0.5-2.5-1.5-3.5L36 17c-1.5-3-4-5-7-5H17c-3 0-5.5 2-7 5l-4.5 5.5C4.5 23.5 4 24.5 4 26v6h2z" fill="#E61F2D"/>
    <!-- Teto -->
    <path d="M13 12l-4 8h30l-4-8c-0.8-1.5-2.3-3-4.5-3H17.5c-2.2 0-3.7 1.5-4.5 3z" fill="#CC1B27"/>
    <!-- Janelas -->
    <path d="M14 14l-3 6h26l-3-6c-0.5-1-1.5-2-3-2H17c-1.5 0-2.5 1-3 2z" fill="#FFFFFF" opacity="0.15"/>
    <!-- Rodas -->
    <circle cx="14" cy="35" r="4.5" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
    <circle cx="14" cy="35" r="2" fill="#444"/>
    <circle cx="34" cy="35" r="4.5" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
    <circle cx="34" cy="35" r="2" fill="#444"/>
    <!-- Brilho/velocidade -->
    <path d="M44 18l6-2" stroke="#E61F2D" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M44 22l5-1" stroke="#E61F2D" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
    <path d="M44 26l4 0" stroke="#E61F2D" stroke-width="0.8" stroke-linecap="round" opacity="0.2"/>
  </g>
  <!-- Texto CARWASH -->
  <text x="56" y="28" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="22" fill="#FFFFFF" letter-spacing="0.05em">CAR</text>
  <text x="100" y="28" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="22" fill="#E61F2D" letter-spacing="0.05em">WASH</text>
  <!-- Subtítulo -->
  <text x="56" y="44" font-family="'Inter', sans-serif" font-weight="400" font-size="10" fill="#666666" letter-spacing="0.1em" text-transform="uppercase">SISTEMA DE GESTÃO</text>
</svg>
